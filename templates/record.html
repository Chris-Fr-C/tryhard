{{define "record"}}
<h1 class="text-3xl font-bold text-gray-800 mb-8">Record New Application</h1>

<div class="bg-white rounded-xl shadow-md p-8">
    <form action="/applications" method="POST" class="space-y-6">
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Job Posting URL</label>
            <div class="flex gap-2">
                <input type="url" id="job_url" name="job_url" required placeholder="https://example.com/jobs/123" oninput="autoFillCompany()" class="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                <button type="button" onclick="prefillFromURL()" class="px-6 py-3 bg-purple-500 text-white rounded-lg hover:bg-purple-600 transition-colors whitespace-nowrap">Prefill</button>
            </div>
        </div>

        <div class="grid md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Company Name</label>
                <input type="text" id="company_name" name="company_name" placeholder="Auto-filled from URL" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Company Website</label>
                <input type="url" id="company_url" name="company_url" placeholder="https://company.com" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Status</label>
            <select name="status" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                <option value="not_submitted" selected>Not Submitted</option>
                <option value="submitted">Submitted</option>
                <option value="interview">Interview</option>
                <option value="waiting_for_answer">Waiting for Answer</option>
                <option value="offer">Offer</option>
            </select>
        </div>

        <div class="grid md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Resume to Use</label>
                <select id="resume_id" name="resume_id" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                    <option value="">Use most recent resume</option>
                    {{range .Resumes}}<option value="{{.ID}}">{{.Name}} ({{.CreatedAt.Format "Jan 02, 2006"}})</option>{{end}}
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Reference Letter</label>
                <select id="reference_id" name="reference_id" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                    <option value="">None</option>
                    {{range .References}}<option value="{{.ID}}">{{.Name}} ({{.CreatedAt.Format "Jan 02, 2006"}})</option>{{end}}
                </select>
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Notes</label>
            <textarea name="notes" rows="4" placeholder="Additional notes..." class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent"></textarea>
        </div>

        <div class="flex gap-4">
            <button type="submit" class="px-8 py-3 bg-primary text-white rounded-lg hover:bg-blue-600 transition-colors font-medium">Save Application</button>
            <a href="/" class="px-8 py-3 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition-colors font-medium">Cancel</a>
        </div>
    </form>
</div>

<script>
function autoFillCompany() {
    const urlInput = document.getElementById('job_url');
    const companyInput = document.getElementById('company_name');
    if (urlInput.value && !companyInput.value) {
        try {
            const url = new URL(urlInput.value);
            const host = url.hostname;
            let company = host.split('.')[0];
            companyInput.placeholder = company.charAt(0).toUpperCase() + company.slice(1);
        } catch (e) {}
    }
}
</script>
{{end}}
