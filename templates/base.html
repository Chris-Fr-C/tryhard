<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>window.rejectedDays = {{.RejectedDays}};</script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3498db',
                        dark: '#2c3e50',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-dark text-white px-6 py-4 shadow-lg">
        <div class="container mx-auto flex items-center justify-between">
            <div class="flex items-center gap-8">
                <div class="flex items-center gap-2">
                    <svg class="w-8 h-8 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                    </svg>
                    <span class="text-xl font-bold">Job Tracker</span>
                </div>
                <div class="flex gap-6">
                    <a href="/" class="hover:text-primary transition-colors {{if eq .CurrentPage "dashboard"}}text-primary{{end}}">Dashboard</a>
                    <a href="/applications" class="hover:text-primary transition-colors {{if eq .CurrentPage "applications"}}text-primary{{end}}">Applications</a>
                    <a href="/record" class="hover:text-primary transition-colors {{if eq .CurrentPage "record"}}text-primary{{end}}">Record</a>
                    <a href="/resources" class="hover:text-primary transition-colors {{if eq .CurrentPage "resources"}}text-primary{{end}}">Resources</a>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <input type="text" id="search-input" placeholder="Search..." 
                    class="px-4 py-2 rounded-lg text-black w-64 focus:outline-none focus:ring-2 focus:ring-primary"
                    onkeypress="if(event.key==='Enter') searchApplications()">
                <button onclick="searchApplications()" class="p-2 bg-primary rounded-lg hover:bg-blue-600 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-8">
        {{.Content}}
    </main>

    <div id="toast-notification" class="fixed top-4 right-4 bg-yellow-500 text-white px-6 py-4 rounded-lg shadow-lg hidden z-50">
        <div id="toast-message"></div>
    </div>

    <div id="search-results-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-xl max-w-4xl w-full max-h-[80vh] overflow-hidden">
            <div class="p-4 border-b flex justify-between items-center">
                <h2 class="text-xl font-semibold">Search Results: <span id="search-query-display"></span></h2>
                <button onclick="closeSearchModal()" class="text-gray-500 hover:text-gray-700">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div id="search-results" class="p-4 overflow-y-auto max-h-[60vh]">
            </div>
        </div>
    </div>

    <script>
        async function updateStatus(id, status) {
            try {
                const response = await fetch(`/api/applications/${id}/status`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ status }) });
                if (response.ok) location.reload();
            } catch (error) { console.error('Error:', error); }
        }
        async function deleteApplication(id) {
            if (confirm('Delete this application?')) {
                try {
                    const response = await fetch(`/api/applications/${id}`, { method: 'DELETE' });
                    if (response.ok) location.reload();
                } catch (error) { console.error('Error:', error); }
            }
        }
        async function deleteResource(id, type) {
            if (confirm('Delete this ' + type + '?')) {
                try {
                    const response = await fetch(`/api/resources/${id}`, { method: 'DELETE' });
                    if (response.ok) location.reload();
                } catch (error) { console.error('Error:', error); }
            }
        }
        async function prefillFromURL() {
            const url = document.getElementById('job_url').value;
            if (!url) { alert('Please enter a job posting URL first'); return; }
            try {
                const response = await fetch(`/api/prefill?url=${encodeURIComponent(url)}`);
                const data = await response.json();
                if (data.company_name && !document.getElementById('company_name').value) {
                    document.getElementById('company_name').value = data.company_name;
                }
                if (data.company_url && !document.getElementById('company_url').value) {
                    document.getElementById('company_url').value = data.company_url;
                }
                if (data.has_existing) {
                    showToast(`Warning: ${data.existing_count} existing application(s) found for this company/URL!`);
                    showExistingApps(data.existing_apps);
                }
            } catch (error) { console.error('Error prefill:', error); }
        }
        async function searchApplications() {
            const query = document.getElementById('search-input').value;
            if (!query) return;
            try {
                const response = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
                const data = await response.json();
                showSearchResults(data.results, query);
            } catch (error) { console.error('Error search:', error); }
        }
        function showSearchResults(results, query) {
            document.getElementById('search-query-display').textContent = query;
            const container = document.getElementById('search-results');
            if (results.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-center py-8">No results found</p>';
            } else {
                container.innerHTML = results.map(app => `
                    <div class="p-4 border rounded-lg mb-2 hover:bg-gray-50 flex items-center gap-4">
                        <div class="flex-1">
                            <a href="/applications/${app.id}" class="block">
                                <div class="font-medium text-lg text-gray-800">${app.company_name}</div>
                                <div class="text-sm text-gray-500">${app.job_url || 'No URL'}</div>
                                <div class="text-xs text-gray-400 mt-1">Status: ${app.status} | Recorded: ${new Date(app.created_at).toLocaleDateString()}</div>
                            </a>
                        </div>
                        <a href="/applications/${app.id}" class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-blue-600">View</a>
                    </div>
                `).join('');
            }
            document.getElementById('search-results-modal').classList.remove('hidden');
        }
        function closeSearchModal() {
            document.getElementById('search-results-modal').classList.add('hidden');
        }
        async function updateOldApplications() {
            if (!confirm('Move applications that have been waiting for more than ' + window.rejectedDays + ' days to "No Response"? This cannot be undone.')) return;
            try {
                const response = await fetch('/api/applications/update-old', { method: 'POST' });
                const data = await response.json();
                showToast(`Updated ${data.updated} application(s) to "No Response" status`);
                if (data.updated > 0) location.reload();
            } catch (error) { console.error('Error:', error); }
        }
        function showToast(message) {
            const toast = document.getElementById('toast-notification');
            document.getElementById('toast-message').textContent = message;
            toast.classList.remove('hidden');
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 5000);
        }
    </script>
</body>
</html>
