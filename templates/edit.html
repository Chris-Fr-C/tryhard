{{define "edit"}}
<h1 class="text-3xl font-bold text-gray-800 mb-8">Edit Application</h1>

<div class="bg-white rounded-xl shadow-md p-8">
    <form action="/applications/{{.Application.ID}}" method="POST" class="space-y-6">
        <input type="hidden" name="_method" value="PUT">
        
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Job Posting URL</label>
            <input type="url" id="job_url" name="job_url" value="{{.Application.JobURL}}" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
        </div>

        <div class="grid md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Company Name</label>
                <input type="text" id="company_name" name="company_name" value="{{.Application.CompanyName}}" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Company Website</label>
                <input type="url" id="company_url" name="company_url" value="{{.Application.CompanyURL}}" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Status</label>
            <select name="status" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                <option value="not_submitted" {{if eq .Application.Status "not_submitted"}}selected{{end}}>Not Submitted</option>
                <option value="submitted" {{if eq .Application.Status "submitted"}}selected{{end}}>Submitted</option>
                <option value="interview" {{if eq .Application.Status "interview"}}selected{{end}}>Interview</option>
                <option value="waiting_for_answer" {{if eq .Application.Status "waiting_for_answer"}}selected{{end}}>Waiting for Answer</option>
                <option value="offer" {{if eq .Application.Status "offer"}}selected{{end}}>Offer</option>
            </select>
        </div>

        <div class="grid md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Resume to Use</label>
                <select id="resume_id" name="resume_id" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                    <option value="">Use most recent resume</option>
                    {{range .Resumes}}<option value="{{.ID}}" {{if eq .Application.ResumeID .ID}}selected{{end}}>{{.Name}} ({{.CreatedAt.Format "Jan 02, 2006"}})</option>{{end}}
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Reference Letter</label>
                <select id="reference_id" name="reference_id" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">
                    <option value="">None</option>
                    {{range .References}}<option value="{{.ID}}" {{if eq .Application.ReferenceID .ID}}selected{{end}}>{{.Name}} ({{.CreatedAt.Format "Jan 02, 2006"}})</option>{{end}}
                </select>
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Notes</label>
            <textarea name="notes" rows="4" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent">{{.Application.Notes}}</textarea>
        </div>

        <div class="flex gap-4">
            <button type="submit" class="px-8 py-3 bg-primary text-white rounded-lg hover:bg-blue-600 transition-colors font-medium">Update Application</button>
            <a href="/applications/{{.Application.ID}}" class="px-8 py-3 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition-colors font-medium">Cancel</a>
        </div>
    </form>
</div>
{{end}}
